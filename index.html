<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBR • Em Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Russo One', sans-serif; }
        body {
            background: #001a4d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: #a15c32;
            border: 6px solid #000;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            box-shadow: 0 0 0 4px #ffe600, 0 10px 0 #000;
        }
        h1 {
            font-size: 2rem;
            color: #ffe600;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 15px;
        }
        p {
            font-size: 1rem;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            background: #000;
            color: #00ffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 2px solid #00ffff;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🛠️ MANUTENÇÃO</h1>
        <p>A GeoBR Demon List está passando por uma grande reformulação visual!</p>
        <div class="status">STATUS: TRABALHANDO NO NOVO DESIGN</div>
    </div>
</body>
</html>
